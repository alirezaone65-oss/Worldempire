/* === بسته‌بندی با پاک‌سازی لاگ (حداکثر ۱۰ مورد) === */
function pack(){
    /* همیشه لاگ‌ها را به ۱۰ مورد محدود کن */
    var limitedLogs=logs.slice(-MAX_LOGS);
    var d={k:DK,p:allP.map(compP),m:mkt,l:limitedLogs,w:wars};
    var s=JSON.stringify(d);
    if(s.length>3900){d.m=d.m.slice(-5);s=JSON.stringify(d);}
    if(s.length>3900){d.w=d.w.filter(function(w){return w.s==="active"||w.s==="peace_req";});s=JSON.stringify(d);}
    if(s.length>3900){d.l=d.l.slice(-3);s=JSON.stringify(d);}
    return s;
}

function calcAtk(p){if(!p)return 0;var pw=0;for(var k in FDB){var cnt=getFgCount(p,k);if(cnt>0)pw+=FDB[k].p*cnt;}return Math.floor(pw);}

function calcDef(p,checkAlliance){if(!p)return 0;var pw=0;for(var k in FDB){var cnt=getFgCount(p,k);if(cnt>0)pw+=FDB[k].d*cnt;}if(p.df)p.df.forEach(function(d){if(DDB[d.t]&&d.h>0)pw+=DDB[d.t].df*(d.h/d.mh);});if(checkAlliance&&p.cc){var ci=CONT[p.cc];if(ci!==undefined){var ac=allP.filter(function(x){return x.id!==p.id&&x.cc&&CONT[x.cc]===ci;}).length;if(ac>0)pw=Math.floor(pw*(1+ALLY_DEF_BONUS));}}return Math.floor(pw);}

/* === دیپلماسی === */
function rDiplo(){if(!P||!P.cc){document.getElementById("p_diplo").innerHTML='<div class="em">کشوری ندارید</div>';return;}var myW=getMyWars(P.id);var h='<div class="st"><i class="fas fa-handshake"></i> روابط دیپلماتیک</div><div style="font-size:.5rem;color:var(--tx2);margin-bottom:6px">جنگ‌های فعال: '+myW.length+'</div>';if(myW.length===0)h+='<div class="em" style="padding:15px">در هیچ جنگی نیستید</div>';myW.forEach(function(w){var isA=w.a===P.id,otherId=isA?w.d:w.a,other=allP.find(function(p){return p.id===otherId;}),oc=other&&other.cc?CDB[other.cc]:null,utl=unTimeLeft(w),isUW=utl<6*3600000;if(w.s==="un_end"){h+='<div class="pr" style="flex-direction:column;align-items:stretch;border-color:var(--un)"><span style="font-size:.55rem">'+(oc?oc.f:"🏳️")+' '+esc(other?other.name:"?")+'</span><span class="bg" style="background:var(--un)">متوقف شده</span></div>';}else if(w.s==="peace_req"&&w.pr===P.id){h+='<div class="pr" style="flex-direction:column;align-items:stretch;border-color:var(--grn)"><div><span style="font-size:.55rem">'+(oc?oc.f:"🏳️")+' '+esc(other?other.name:"?")+'</span> <span class="bg" style="background:var(--grn)">در انتظار</span></div><button class="bt bt-d bt-s" style="margin-top:4px" onclick="cancelPeace(\''+w.a+'\',\''+w.d+'\')"><i class="fas fa-times"></i> لغو</button></div>';}else if(w.s==="peace_req"&&w.pr!==P.id){h+='<div class="pr" style="flex-direction:column;align-items:stretch;border-color:var(--blu)"><div><span style="font-size:.55rem">'+(oc?oc.f:"🏳️")+' '+esc(other?other.name:"?")+'</span> <span class="bg" style="background:var(--blu)">درخواست صلح</span></div><div style="display:flex;gap:4px;margin-top:4px"><button class="bt bt-gr bt-s" onclick="accPeace(\''+w.a+'\',\''+w.d+'\')"><i class="fas fa-check"></i> قبول</button><button class="bt bt-r bt-s" onclick="rejPeace(\''+w.a+'\',\''+w.d+'\')"><i class="fas fa-times"></i> رد</button></div></div>';}else{h+='<div class="pr" style="flex-direction:column;align-items:stretch;'+(isUW?'border-color:var(--un)':'')+'"><div><span style="font-size:.55rem">'+(oc?oc.f:"🏳️")+' '+esc(other?other.name:"?")+'</span> <span class="bg" style="background:'+(isA?'var(--red)':'var(--blu)')+'">'+(isA?'حمله‌کننده':'مدافع')+'</span></div><div style="font-size:.4rem;color:var(--tx2);margin-top:2px">حملات: '+(w.ac||0)+'</div><div class="pb"><div class="pf pf-un" style="width:'+Math.max(0,utl/UN_LIM*100)+'%"></div></div><div class="wt">'+(isUW?'⚠️ ':'🇺🇳 ')+fmtT(utl)+'</div><button class="bt bt-gr bt-s" style="margin-top:4px" onclick="reqPeace(\''+w.a+'\',\''+w.d+'\')"><i class="fas fa-dove"></i> درخواست صلح</button></div>';}});

/* اعلام جنگ */
var activeWars=getMyWars(P.id).filter(function(w){return w.s==="active";});if(activeWars.length<3){h+='<div class="st"><i class="fas fa-crosshairs"></i> اعلام جنگ</div>';var targets=allP.filter(function(p){return p.id!==P.id&&p.cc&&!getWarWith(P.id,p.id);});if(targets.length===0)h+='<div class="em">هدفی نیست</div>';targets.forEach(function(t){var c2=CDB[t.cc],myCont=getPlayerCont(P.id),allyAtk=countAllyAttackers(myCont,t.id),blocked=allyAtk>=MAX_ALLY_ATK;h+='<div class="pr"'+(blocked?' style="opacity:.5"':'')+'><span style="font-size:.5rem">'+(c2?c2.f:"🏳️")+' '+esc(t.name)+' | <span class="stat-d">🛡️'+calcDef(t,true)+'</span></span>'+(blocked?'<span style="font-size:.35rem;color:var(--un)">اتحاد پر</span>':'<button class="bt bt-r bt-s" onclick="declWar(\''+t.id+'\')"><i class="fas fa-bolt"></i> جنگ</button>')+'</div>';});}else{h+='<div class="em">حداکثر ۳ جنگ همزمان</div>';}document.getElementById("p_diplo").innerHTML=h;}

window.declWar=async function(tid){if(!P||!P.cc)return;if(getWarWith(P.id,tid))return toast("قبلاً جنگ دارید","er");if(getMyWars(P.id).filter(function(w){return w.s==="active";}).length>=3)return toast("حداکثر ۳ جنگ","er");var t=allP.find(function(p){return p.id===tid;});if(!t||!t.cc)return;var mc=getPlayerCont(P.id);if(mc>=0&&countAllyAttackers(mc,tid)>=MAX_ALLY_ATK)return toast("حداکثر حمله اتحاد پر شده","er");wars.push({a:P.id,d:tid,st:ts(),s:"active",ac:0,pr:null,la:0});dirty=true;logs.push({t:ts(),x:" <span class='ls'>⚔️</span> "+esc(P.name)+" به "+esc(t.name)+" اعلام جنگ کرد."});await saveAll();upAll();toast("جنگ اعلام شد!","er");};

window.accPeace=async function(a,d){var w=wars.find(function(x){return x.a===a&&x.d===d&&x.s==="peace_req";});if(!w||w.pr===P.id)return;w.s="end";dirty=true;var oId=w.a===P.id?w.d:w.a;var other=allP.find(function(p){return p.id===oId;});logs.push({t:ts(),x:" <span class='lt'>🕊️ صلح</span> بین "+esc(P.name)+" و "+esc(other?other.name:"?")+" برقرار شد."});await saveAll();upAll();toast("صلح برقرار شد","pe");};
window.rejPeace=async function(a,d){var w=wars.find(function(x){return x.a===a&&x.d===d&&x.s==="peace_req";});if(!w||w.pr===P.id)return;w.s="active";w.pr=null;dirty=true;await saveAll();upAll();toast("درخواست صلح رد شد","er");};
window.cancelPeace=async function(a,d){var w=wars.find(function(x){return x.a===a&&x.d===d&&x.s==="peace_req";});if(!w||w.pr!==P.id)return;w.s="active";w.pr=null;dirty=true;await saveAll();upAll();toast("لغو درخواست صلح","er");};

/* === معدن === */
function calcMine(p){if(!p||!p.cc)return{g:0,o:0,m:0,cap:0};var b=1+(CDB[p.cc].ev||0)*0.2;var s=Math.min((ts()-(p.lc||ts()))/1000,3600);var c=p.ml*500*b,r=p.ml*0.4*b,e=p.res.eco*0.1;return{g:Math.min(c,Math.floor((r*2+e)*s)),o:Math.min(c,Math.floor((r+e*0.5)*s)),m:Math.min(c,Math.floor((r*1.5+e*0.7)*s)),cap:c};}

function rMine(){if(!P||!P.cc){document.getElementById("p_mine").innerHTML='<div class="em">کشوری ندارید</div>';return;}var mn=calcMine(P),upC=P.ml*12000;document.getElementById("p_mine").innerHTML='<div class="cd"><div class="ic">⛏️</div><div class="nm">معدن سطح '+P.ml+'</div><div class="cs">ظرفیت: '+mn.cap.toLocaleString("fa-IR")+'</div><div style="margin-top:6px;text-align:right;font-size:.5rem"><div style="display:flex;justify-content:space-between"><span>💰 طلا</span><span style="color:var(--gl)">'+mn.g+'/'+mn.cap+'</span></div><div class="pb"><div class="pf pf-g" style="width:'+Math.min(100,mn.g/(mn.cap||1)*100)+'%"></div></div><div style="display:flex;justify-content:space-between"><span>🛢️ نفت</span><span style="color:var(--gl)">'+mn.o+'/'+mn.cap+'</span></div><div class="pb"><div class="pf pf-g" style="width:'+Math.min(100,mn.o/(mn.cap||1)*100)+'%"></div></div><div style="display:flex;justify-content:space-between"><span>⛏️ فلز</span><span style="color:var(--gl)">'+mn.m+'/'+mn.cap+'</span></div><div class="pb"><div class="pf pf-g" style="width:'+Math.min(100,mn.m/(mn.cap||1)*100)+'%"></div></div></div><button class="bt bt-g bt-f" style="margin-top:8px" onclick="colMine()"><i class="fas fa-gem"></i> استخراج</button><hr style="border-color:var(--bd);margin:8px 0"><div class="cs">ارتقا: '+upC.toLocaleString("fa-IR")+' طلا</div><button class="bt bt-gr bt-f" '+(P.g<upC?"disabled":"")+' onclick="upgM()"><i class="fas fa-arrow-up"></i> ارتقا معدن</button></div>';}

window.colMine=async function(){var mn=calcMine(P);if(mn.g+mn.o+mn.m===0)return toast("معدن خالی - صبر کنید","er");P.g+=mn.g;P.o+=mn.o;P.m+=mn.m;P.lc=ts();dirty=true;await saveAll();upRes();rMine();toast("استخراج شد","pe");};

/* === نظامی === */
function rMil(){if(!P||!P.cc){document.getElementById("p_mil").innerHTML='<div class="em">کشوری ندارید</div>';return;}var h='<div class="st"><i class="fas fa-fighter-jet"></i> جنگنده‌ها</div><div class="g2">';for(var k in FDB){var f=FDB[k],has=P.res.air>=f.r,af=P.g>=f.cg&&P.o>=f.co&&P.m>=f.cm,cnt=getFgCount(P,k);h+='<div class="cd" style="opacity:'+(has?1:0.4)+'"><div class="ic">✈️</div><span class="tier '+(TIER_CSS[f.tier]||'')+'">'+(TIER_NAMES[f.tier]||'')+'</span><div class="nm">'+f.n+'</div><div class="cs"><span class="stat-a">حمله:'+f.p+'</span> | <span class="stat-d">دفاع:'+f.d+'</span>'+(f.r?' | هوانوردی:'+f.r:'')+'</div><div class="cs">💰'+f.cg+' 🛢️'+f.co+' ⛏️'+f.cm+'</div><div class="bg">دارید: '+cnt+'</div><button class="bt bt-b bt-s" '+((!has||!af)?'disabled':'')+' onclick="bldF(\''+k+'\')">ساخت</button></div>';}h+='</div><div class="st"><i class="fas fa-shield-alt"></i> پدافند</div><div class="g2">';for(var dk in DDB){var d=DDB[dk],daf=P.g>=d.cg&&P.o>=d.co&&P.m>=d.cm;var natL=d.nat?("("+NAT_NAMES[d.nat]+")"):"";h+='<div class="cd"><div class="ic">🛡️</div><div class="nm">'+d.n+' '+natL+'</div><div class="cs">دفاع:'+d.df+' HP:'+d.hp+'</div><div class="cs">💰'+d.cg+' 🛢️'+d.co+' ⛏️'+d.cm+'</div><button class="bt bt-gr bt-s" '+(daf?'':'disabled')+' onclick="bldD(\''+dk+'\')">ساخت</button></div>';}h+='</div>';if(P.df&&P.df.length>0){h+='<div class="st"><i class="fas fa-wrench"></i> پدافند مستقر</div>';P.df.forEach(function(d){var info=DDB[d.t];if(!info)return;var hp=Math.max(0,d.h),pct=hp/(d.mh||1)*100,dmg=d.mh-hp,cost=dmg*12;h+='<div class="pr" style="flex-direction:column;align-items:stretch"><div style="display:flex;justify-content:space-between;font-size:.5rem"><span>🛡️ '+info.n+'</span><span style="color:'+(pct>50?'#4ade80':'#ef4444')+'">'+hp+'/'+d.mh+'</span></div><div class="pb"><div class="pf pf-h" style="width:'+pct+'%"></div></div>'+(dmg>0?'<button class="bt bt-g bt-s" '+(P.g<cost?"disabled":"")+' onclick="repD(\''+d.id+'\')">تعمیر ('+cost+'💰)</button>':'<div style="text-align:center;color:#4ade80;font-size:.4rem">آماده</div>')+'</div>';});}document.getElementById("p_mil").innerHTML=h;}

window.repD=async function(id){var d=(P.df||[]).find(function(x){return x.id===id;});if(!d)return;var dmg=d.mh-d.h,cost=dmg*12;if(P.g<cost)return toast("طلا کم","er");P.g-=cost;d.h=d.mh;dirty=true;await saveAll();upRes();rMil();toast("تعمیر شد","pe");};

/* === جنگ (کامل و بدون باگ) === */
function rWar(){if(!P||!P.cc){document.getElementById("p_war").innerHTML='<div class="em">کشوری ندارید</div>';return;}var myA=calcAtk(P),myCont=getPlayerCont(P.id);var h='<div style="background:var(--bg2);padding:6px 10px;border-radius:10px;margin-bottom:8px;font-size:.5rem;border:1px solid var(--bd);text-align:center"><span class="stat-a">⚔️ حمله: <b>'+myA+'</b></span> | <span class="stat-d">🛡️ دفاع: <b>'+calcDef(P,true)+'</b></span></div>';if(myA<=0)h+='<div class="em">برای حمله جنگنده بسازید!</div>';var myW=getMyWars(P.id).filter(function(w){return w.s==="active";});h+='<div class="st"><i class="fas fa-bomb"></i> اهداف جنگی</div>';if(myW.length===0)h+='<div class="em">ابتدا از دیپلماسی جنگ اعلام کنید</div>';myW.forEach(function(w){var otherId=w.a===P.id?w.d:w.a;var t=allP.find(function(p){return p.id===otherId;});if(!t||!t.cc)return;var c=CDB[t.cc],td=calcDef(t,true),utl=unTimeLeft(w);if(utl<=0)return;var cd=atkCdLeft(w),inCd=cd>0;h+='<div class="pr" style="flex-direction:column;align-items:stretch;border-color:var(--red)"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:.55rem">'+(c?c.f:"🏳️")+' '+esc(t.name)+'</span><span style="font-size:.4rem"><span class="stat-d">🛡️'+td+'</span></span></div><div class="wt" style="margin:3px 0">🇺🇳 '+fmtT(utl)+'</div>'+(inCd?'<div class="cd-timer" style="color:var(--red);border-color:rgba(192,57,43,.3)"><i class="fas fa-clock"></i> کول‌داون: '+fmtS(cd)+' ثانیه</div>':'')+'<button class="bt bt-r bt-f" '+((myA<=0||inCd)?'disabled':'')+' onclick="doAttack(\''+w.a+'\',\''+w.d+'\')"><i class="fas fa-bomb"></i> '+(inCd?'کول‌داون '+fmtS(cd)+' ثانیه':'حمله تمام‌عیار')+'</button></div>';});document.getElementById("p_war").innerHTML=h;}

window.closeBattle=function(){document.getElementById("battleOv").classList.remove("on");};

window.doAttack=async function(aid,did){
var w=wars.find(function(x){return x.a===aid&&x.d===did&&x.s==="active";});
if(!w)return toast("جنگ فعال نیست","er");
if(unTimeLeft(w)<=0)return toast("سازمان ملل متوقف کرده","er");
var cd=atkCdLeft(w);if(cd>0)return toast("کول‌داون: "+fmtS(cd)+" ثانیه","er");
var otherId=w.a===P.id?w.d:w.a;
var t=allP.find(function(p){return p.id===otherId;});
if(!t)return toast("هدف یافت نشد","er");
var myA=calcAtk(P);if(myA<=0)return toast("جنگنده بسازید","er");
var eD=calcDef(t,true);
w.ac=(w.ac||0)+1; w.la=ts(); dirty=true;

/* انیمیشن نبرد */
var ov=document.getElementById("battleOv"),st=document.getElementById("bStatus"),rs=document.getElementById("bResult"),bm=document.getElementById("boomIco");
ov.classList.add("on"); st.innerText="قفل هدف: "+t.name; rs.innerHTML=""; bm.innerText="🚀"; st.style.color="";
document.getElementById("app").classList.add("sk");
await new Promise(function(r){setTimeout(r,800);});
document.getElementById("app").classList.remove("sk");
st.innerText="اصابت!"; bm.innerText="💥";
document.getElementById("app").classList.add("sk");
await new Promise(function(r){setTimeout(r,1000);});
document.getElementById("app").classList.remove("sk");

var msg="",res="",ratio=myA/(eD||1);

if(ratio>1.3){
    var lr=0.25+Math.min(0.1,(ratio-1.3)*0.05);
    var lg={g:Math.floor(t.g*lr),o:Math.floor(t.o*lr),m:Math.floor(t.m*lr)};
    t.g-=lg.g;t.o-=lg.o;t.m-=lg.m;P.g+=lg.g;P.o+=lg.o;P.m+=lg.m;P.xp+=25;t.xp+=5;
    var al=0;for(var k in P.fg){var l=Math.ceil(P.fg[k]*0.15);P.fg[k]=Math.max(0,P.fg[k]-l);al+=l;}
    var dl=0;if(t.fg)for(var k2 in t.fg){var l2=Math.ceil(t.fg[k2]*0.7);t.fg[k2]=Math.max(0,t.fg[k2]-l2);dl+=l2;}
    var dd=t.df?t.df.length:0;if(t.df)t.df.forEach(function(d){d.h=0;});if(t.df)t.df=t.df.filter(function(d){return d.h>0;});
    msg='<span class="at">'+esc(P.name)+'</span> به <span class="df">'+esc(t.name)+'</span> حمله کرد و <b>پیروز شد</b>! غارت: '+lg.g+'💰 '+lg.o+'🛢️ '+lg.m+'⛏️ | تلفات شما: '+al+' | دشمن: '+dl+' جنگنده، '+dd+' پدافند';
    res='<div style="color:#4ade80;font-size:1.1rem;font-weight:900;margin-bottom:6px">پیروزی قاطع!</div>غارت: '+lg.g+'💰 '+lg.o+'🛢️ '+lg.m+'⛏️<br>تلفات شما: '+al+'<br>XP: +25';
    st.style.color="#4ade80";
}else if(ratio>0.8){
    var lr2=0.08+Math.min(0.07,(ratio-0.8)*0.3);
    var lg2={g:Math.floor(t.g*lr2),o:Math.floor(t.o*lr2),m:Math.floor(t.m*lr2)};
    t.g-=lg2.g;t.o-=lg2.o;t.m-=lg2.m;P.g+=lg2.g;P.o+=lg2.o;P.m+=lg2.m;P.xp+=15;t.xp+=10;
    var al2=0;for(var k3 in P.fg){var l3=Math.ceil(P.fg[k3]*0.45);P.fg[k3]=Math.max(0,P.fg[k3]-l3);al2+=l3;}
    var dl2=0;if(t.fg)for(var k4 in t.fg){var l4=Math.ceil(t.fg[k4]*0.5);t.fg[k4]=Math.max(0,t.fg[k4]-l4);dl2+=l4;}
    if(t.df)t.df.forEach(function(d){d.h=Math.max(0,d.h-40);});if(t.df)t.df=t.df.filter(function(d){return d.h>0;});
    msg='<span class="at">'+esc(P.name)+'</span> به <span class="df">'+esc(t.name)+'</span> حمله کرد - <b>نبرد نزدیک!</b> غارت: '+lg2.g+'💰 '+lg2.o+'🛢️ '+lg2.m+'⛏️ | تلفات: '+al2;
    res='<div style="color:#fbbf24;font-size:1.1rem;font-weight:900;margin-bottom:6px">نبرد نزدیک!</div>غارت کم: '+lg2.g+'💰 '+lg2.o+'🛢️ '+lg2.m+'⛏️<br>تلفات سنگین: '+al2+'<br>XP: +15';
    st.style.color="#fbbf24";
}else{
    P.xp+=3;t.xp+=20;
    var al5=0;for(var k5 in P.fg){var l5=Math.ceil(P.fg[k5]*0.8);P.fg[k5]=Math.max(0,P.fg[k5]-l5);al5+=l5;}
    var dl5=0;if(t.fg)for(var k6 in t.fg){var l6=Math.ceil(t.fg[k6]*0.15);t.fg[k6]=Math.max(0,t.fg[k6]-l6);dl5+=l6;}
    if(t.df)t.df.forEach(function(d){d.h=Math.max(0,d.h-20);});if(t.df)t.df=t.df.filter(function(d){return d.h>0;});
    msg='<span class="at">'+esc(P.name)+'</span> به <span class="df">'+esc(t.name)+'</span> حمله کرد و <b>شکست خورد!</b> تلفات: '+al5+' نیرو';
    res='<div style="color:#ef4444;font-size:1.1rem;font-weight:900;margin-bottom:6px">شکست!</div>نیروها نابود شدند<br>تلفات دشمن: '+dl5+'<br>XP: +3';
    st.style.color="#fca5a5";
}
rs.innerHTML=res;
logs.push({t:ts(),x:msg});
await saveAll();
upRes();
};

/* === بازار === */
function rMkt(){if(!P||!P.cc){document.getElementById("p_mkt").innerHTML='<div class="em">کشوری ندارید</div>';return;}var rates=[{r:"o",n:"نفت",ic:"🛢️",b:3,s:2},{r:"m",n:"فلز",ic:"⛏️",b:2,s:1.5}];var h='<div class="st"><i class="fas fa-store"></i> بازار جهانی</div>';rates.forEach(function(rt){var have=P[rt.r]||0;h+='<div class="cd" style="text-align:right"><div style="text-align:center"><div class="ic">'+rt.ic+'</div><div class="nm">'+rt.n+': '+Math.floor(have).toLocaleString("fa-IR")+'</div></div><div style="display:flex;gap:4px;margin-top:6px;justify-content:center"><button class="bt bt-g bt-s" onclick="buyRes(\''+rt.r+'\','+rt.b+')"><i class="fas fa-cart-plus"></i> خرید (💰'+rt.b+' هر واحد)</button><button class="bt bt-r bt-s" onclick="sellRes(\''+rt.r+'\','+rt.s+')"><i class="fas fa-hand-holding-usd"></i> فروش (💰'+rt.s+' هر واحد)</button></div><div style="margin-top:4px;text-align:center"><input class="nmb" type="number" id="mkt_'+rt.r+'" value="10" min="1" max="9999" style="width:80px;display:inline-block"></div></div>';});document.getElementById("p_mkt").innerHTML=h;}

window.buyRes=async function(r,rate){if(!P)return;var inp=document.getElementById("mkt_"+r);var amt=parseInt(inp.value)||0;if(amt<=0)return toast("مقدار وارد کنید","er");var cost=Math.floor(amt*rate);if(P.g<cost)return toast("طلا کافی نیست (نیاز: "+cost+")","er");P.g-=cost;P[r]=(P[r]||0)+amt;dirty=true;await saveAll();upRes();rMkt();toast(amt+" واحد خریداری شد","pe");};
window.sellRes=async function(r,rate){if(!P)return;var inp=document.getElementById("mkt_"+r);var amt=parseInt(inp.value)||0;if(amt<=0)return toast("مقدار وارد کنید","er");if((P[r]||0)<amt)return toast("منبع کافی نیست","er");P[r]-=amt;P.g+=Math.floor(amt*rate);dirty=true;await saveAll();upRes();rMkt();toast(amt+" unit فروخته شد","pe");};

/* === تحقیق === */
var RES_DATA=[
{id:"mil",n:"تقویت نظامی",ic:"⚔️",d:"حمله جنگنده‌ها +۱۰٪",cost:5000,lv:0,max:5,eff:function(p){p.res.mil++;}},
{id:"eco",n:"رشد اقتصادی",ic:"📈",d:"سرعت معدن +۱۵٪",cost:4000,lv:0,max:5,eff:function(p){p.res.eco++;}},
{id:"air",n:"هوانوردی پیشرفته",ic:"✈️",d:"سطح هوانوردی +۱",cost:8000,lv:0,max:10,eff:function(p){p.res.air++;}}
];
function rRes(){if(!P||!P.cc){document.getElementById("p_res").innerHTML='<div class="em">کشوری ندارید</div>';return;}var h='<div class="st"><i class="fas fa-flask"></i> تحقیقات</div>';RES_DATA.forEach(function(res){var lv=P.res[res.id]||0;var cost=res.cost*(lv+1);h+='<div class="cd" style="text-align:right"><div style="display:flex;align-items:center;gap:8px"><div class="ic">'+res.ic+'</div><div><div class="nm">'+res.n+' (سطح '+lv+'/'+res.max+')</div><div class="cs">'+res.d+'</div></div></div><div class="pb"><div class="pf pf-g" style="width:'+(lv/res.max*100)+'%"></div></div><button class="bt bt-p bt-f" '+(lv>=res.max||P.g<cost?"disabled":"")+' onclick="doRes(\''+res.id+'\')"><i class="fas fa-flask"></i> تحقیق (💰'+cost.toLocaleString("fa-IR")+')</button></div>';});document.getElementById("p_res").innerHTML=h;}

window.doRes=async function(rid){var res=RES_DATA.find(function(r){return r.id===rid;});if(!res)return;var lv=P.res[rid]||0;if(lv>=res.max)return toast("حداکثر سطح","er");var cost=res.cost*(lv+1);if(P.g<cost)return toast("طلا کم","er");P.g-=cost;res.eff(P);dirty=true;P.xp+=10;logs.push({t:ts(),x:" <span class='alc'>🔬</span> "+esc(P.name)+" تحقیق "+res.n+" سطح "+(lv+1)+" را تکمیل کرد."});await saveAll();upRes();rRes();toast(res.n+" سطح "+(lv+1),"pe");};

/* === رتبه‌بندی === */
function rRank(){var sorted=allP.slice().sort(function(a,b){return b.xp-a.xp;});var h='<div class="st"><i class="fas fa-trophy"></i> رتبه‌بندی امپراتوری‌ها</div>';if(sorted.length===0){h+='<div class="em">بازیکنی وجود ندارد</div>';}sorted.forEach(function(p,i){var c=p.cc?CDB[p.cc]:null;var isMe=P&&P.id===p.id;h+='<div class="pr" style="'+(isMe?'border-color:var(--gd);background:var(--bg3)':'')+'"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:.6rem;font-weight:900;color:'+(i===0?'#f5c842':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--tx2)')+'">'+(i+1)+'</span>'+(c?c.f:"🏳️")+'<span style="font-size:.5rem;font-weight:700">'+esc(p.name)+(isMe?' (شما)':'')+'</span></div><div style="font-size:.4rem;color:var(--tx2)">⭐'+p.xp+(c?' | '+c.n:'')+' | ⚔️'+calcAtk(p)+' 🛡️'+calcDef(p,true)+'</div></div>';});document.getElementById("p_rank").innerHTML=h;}

/* === گزارش === */
function rBlog(){var h='<div class="st"><i class="fas fa-scroll"></i> گزارش رویدادها (آخرین '+MAX_LOGS+' مورد)</div>';if(logs.length===0){h+='<div class="em">رویدادی ثبت نشده</div>';}else{h+='<div class="bl">';logs.slice().reverse().forEach(function(l){h+='<div class="le"><span style="color:var(--tx2);font-size:.35rem">'+fmtTimeAgo(l.t)+'</span> '+l.x+'</div>';});h+='</div>';}document.getElementById("p_blog").innerHTML=h;}

/* === پنل ادمین === */
window.openAdmin=function(){document.getElementById("admOv").classList.add("on");document.getElementById("admResults").innerHTML="";};
window.closeAdmin=function(){document.getElementById("admOv").classList.remove("on");};
window.doAdminLogin=function(){var ps=document.getElementById("admPass").value;if(ps!==ADM_PS)return toast("رمز ادمین اشتباه","er");adminIn=true;document.getElementById("admLogin").style.display="none";document.getElementById("admPanel").style.display="block";doAdmSearch();};
window.doAdmSearch=function(){
if(!adminIn)return;
var q=document.getElementById("admSearch").value.trim().toLowerCase();
var filtered=q?allP.filter(function(p){return p.name.toLowerCase().indexOf(q)!==-1;}):allP;
document.getElementById("admCount").innerText=allP.length;
document.getElementById("admCountries").innerText=allP.filter(function(p){return p.cc;}).length;
var h="";
if(filtered.length===0)h='<div class="em">نتیجه‌ای یافت نشد</div>';
filtered.forEach(function(p){var c=p.cc?CDB[p.cc]:null;
h+='<div class="adm-card"><div class="ac-name">'+(c?c.f:"🏳️")+' '+esc(p.name)+(c?' - '+c.n:' (بدون کشور)')+'</div>';
h+='<div class="ac-pass"><i class="fas fa-key"></i> رمز: <b>'+esc(p.pass)+'</b></div>';
h+='<div class="ac-info">💰'+Math.floor(p.g)+' 🛢️'+Math.floor(p.o)+' ⛏️'+Math.floor(p.m)+' | ⭐'+p.xp+' | معدن سطح '+p.ml+' | ⚔️'+calcAtk(p)+' 🛡️'+calcDef(p,false)+'</div>';
if(c)h+='<div class="ac-info">اجاره: '+fmtT(rentLeft(p))+'</div>';
h+='</div>';});
document.getElementById("admResults").innerHTML=h;
};

/* === سینک خودکار === */
async function autoSync(){
if(!connected||!P)return;
/* بارگذاری مجدد داده‌های دیگران */
await loadAll();
/* یافتن داده‌های خودمان */
var myData=allP.find(function(p){return p.id===P.id;});
if(myData){P.g=myData.g;P.o=myData.o;P.m=myData.m;P.xp=myData.xp;P.ml=myData.ml;P.res=myData.res;P.fg=myData.fg;P.df=myData.df;P.cc=myData.cc;P.at=myData.at;P.lc=myData.lc;}
freeExpired();checkUN();
if(dirty)await saveAll();
upRes();
renderTab();
}

/* === شروع === */
async function init(){
loadDM();
var ok=await initTG();
if(ok){await loadAll();}else{
/* حالت آفلاین - فقط از داده‌های کش شده */
}
document.getElementById("loginBox").style.display="flex";
/* بررسی لینک دستگاه */
var dl=getDevLink();
if(dl&&dl.d===getDevId()&&allP.length>0){var ex=allP.find(function(p){return p.id===dl.p;});if(ex){document.getElementById("pName").value=ex.name;document.getElementById("pName").style.opacity="0.6";}}
/* سینک خودکار */
setInterval(autoSync,SYNC);
}

init();
</script>

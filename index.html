/* === رفع باگ اصلی: دیکشنری جنگنده‌ها سمت کلاینت === */
/* وقتی دیتابیس فشرده میشه، جنگنده‌های با تعداد 0 حذف میشن. */
/* حالا هنگام محاسبه، اگر کلید وجود نداشته باشه 0 در نظر گرفته میشه و باگ حمله حل میشه. */
function getFgCount(p, k){ return (p.fg && p.fg[k]) ? p.fg[k] : 0; }

async function api(m,p={},r=0){try{const res=await fetch("https://api.telegram.org/bot"+TK+"/"+m,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});const d=await res.json();if(!d.ok&&d.error_code===429&&r<2){await new Promise(x=>setTimeout(x,1500));return api(m,p,r+1);}return d;}catch(e){if(r<1){await new Promise(x=>setTimeout(x,1000));return api(m,p,r+1);}return{ok:false};}}

async function initTG(){
upS("اتصال...","wr");
const b=await api("getMe");if(!b.ok){upS("خطا","off",1);return false;}
const c=await api("getChat",{chat_id:CH});
if(c.ok&&c.result){
if(c.result.pinned_message?.text?.includes(DK))msgId=c.result.pinned_message.message_id;
else{const s=await api("sendMessage",{chat_id:CH,text:DK+"\n{}"});if(s.ok){msgId=s.result.message_id;await api("pinChatMessage",{chat_id:CH,message_id:msgId});}}
connected=true;upS("آنلاین","on");return true;
}
upS("ربات ادمین نیست","off",1);return false;
}
function upS(t,s,rc=0){document.getElementById("syncTxt").innerText=t;const o=document.getElementById("onBar");o.className="ob "+s;document.getElementById("onTxt").innerText=t;document.getElementById("reconnBtn").style.display=rc?"inline-block":"none";}
window.forceReconn=async function(){if(await initTG()){await loadAll();upAll();}};

/* فشرده‌سازی - بدون حذف جنگنده‌های صفر برای جلوگیری از باگ */
function compP(p){return{i:p.id,n:p.name,ps:p.pass,cc:p.cc,g:p.g,o:p.o,m:p.m,x:p.xp,ml:p.ml,lc:p.lc,r:[p.res.mil,p.res.eco,p.res.air],f:p.fg||{},d:p.df||[],at:p.at};}
function decompP(c){return{id:c.i,name:c.n,pass:c.ps,cc:c.cc||null,g:c.g||0,o:c.o||0,m:c.m||0,xp:c.x||0,ml:c.ml||1,lc:c.lc||ts(),res:{mil:c.r?.[0]||0,eco:c.r?.[1]||0,air:c.r?.[2]||0},fg:c.f||{},df:c.d||[],at:c.at||ts()};}
function pack(){
const d={k:DK,p:allP.map(compP),m:mkt,l:logs.slice(-3),w:wars};
let s=JSON.stringify(d);
/* فقط در صورت اضطرار فشرده‌سازی کنی اما جنگنده‌ها رو حذف نکن! فقط لاگ‌ها رو کم کن */
if(s.length>3900){d.l=[];s=JSON.stringify(d);}
return s;
}
async function saveAll(){
if(!connected||!msgId)return false;
const r=await api("editMessageText",{chat_id:CH,message_id:msgId,text:DK+"\n"+pack()});
if(r?.ok){upS("ذخیره","on");return true;}
upS("خطا ذخیره","off",1);return false;
}
async function loadAll(){
if(!connected)if(!await initTG())return false;
const c=await api("getChat",{chat_id:CH});
if(c.ok&&c.result?.pinned_message?.text){
try{const t=c.result.pinned_message.text.replace(DK+"\n",""),j=JSON.parse(t);
if(j.k===DK){allP=(j.p||[]).map(decompP);mkt=j.m||[];logs=j.l||[];wars=j.w||[];return true;}}catch(e){}
}
return false;
}

function getOwner(cc){return allP.find(p=>p.cc===cc);}
function rentLeft(p){if(!p||!p.cc)return 0;return RENT-(ts()-p.at);}
function isFree(cc){const o=getOwner(cc);if(!o)return true;return rentLeft(o)<=0;}
function freeExpired(){allP.forEach(p=>{if(p.cc&&rentLeft(p)<=0){logs.push({t:ts(),x:" "+esc(p.name)+" اجاره "+CDB[p.cc]?.n+" منقضی شد."});p.cc=null;p.at=ts();}});}
function getMyWars(id){return wars.filter(w=>(w.a===id||w.d===id)&&w.s!=="end");}
function getWarWith(id1,id2){return wars.find(w=>((w.a===id1&&w.d===id2)||(w.a===id2&&w.d===id1))&&w.s!=="end");}
function unTimeLeft(w){return UN_LIM-(ts()-w.st);}
function checkUN(){wars.forEach(w=>{if(w.s==="active"&&unTimeLeft(w)<=0){w.s="un_end";logs.push({t:ts(),x:" <span class='untx'>سازمان ملل</span> جنگ بین "+esc(allP.find(p=>p.id===w.a)?.name||"?")+" و "+esc(allP.find(p=>p.id===w.d)?.name||"?")+" را متوقف کرد."});}});}
function makeP(nm,ps){return{id:nm+"_"+ts().toString(36),name:nm,pass:ps,cc:null,g:0,o:0,m:0,xp:0,ml:1,lc:ts(),res:{mil:0,eco:0,air:0},fg:{},df:[],at:ts()};}

/* محاسبات قدرت - رفع باگ حمله */
function calcAtk(p){
if(!p)return 0;
let pw=0;
/* استفاده از تابع امن برای خواندن تعداد جنگنده‌ها */
for(const[k,f]of Object.entries(FDB)){
const cnt = getFgCount(p, k);
if(cnt > 0) pw += f.p * cnt;
}
return Math.floor(pw);
}
function calcDef(p){if(!p)return 0;let pw=calcAtk(p)*0.4;if(p.df)p.df.forEach(d=>{if(DDB[d.t]&&d.h>0)pw+=DDB[d.t].df*(d.h/d.mh);});return Math.floor(pw);}

window.doLogin=async function(){
const nm=document.getElementById("pName").value.trim(),ps=document.getElementById("pPass").value.trim();
if(nm.length<3||ps.length<4)return toast("نام حداقل ۳ و رمز حداقل ۴ حرف","er");
let ex=allP.find(p=>p.name===nm);
if(ex){if(ex.pass!==ps)return toast("رمز اشتباه","er");P=ex;}
else{P=makeP(nm,ps);allP.push(P);await saveAll();}
document.getElementById("loginBox").style.display="none";
freeExpired();checkUN();
if(P.cc&&rentLeft(P)<=0){P.cc=null;await saveAll();}
isSpec=!P.cc;
document.getElementById("gameUI").style.display="block";
document.getElementById("specBar").style.display=isSpec?"block":"none";
buildTabs();upAll();toast("ورود موفق","pe");
};

function getTabs(){
const t=[{id:"select",n:" نقشه",i:"fa-globe-americas"}];
if(!isSpec)t.push({id:"country",n:" کشور",i:"fa-landmark"},{id:"diplo",n:" دیپلماسی",i:"fa-handshake"},{id:"mine",n:" معدن",i:"fa-gem"},{id:"mil",n:" نظامی",i:"fa-fighter-jet"},{id:"war",n:" جنگ",i:"fa-crosshairs"},{id:"mkt",n:" بازار",i:"fa-store"},{id:"res",n:" تحقیق",i:"fa-flask"});
t.push({id:"rank",n:" رتبه",i:"fa-trophy"},{id:"blog",n:" گزارش",i:"fa-scroll"});
return t;
}
function buildTabs(){
const T=getTabs();let h="",ph="";
T.forEach((t,i)=>{h+=`<div class="tab${i===0?' on':''}" data-t="${t.id}"><i class="fas ${t.i}"></i>${t.n}</div>`;ph+=`<div class="pnl${i===0?' on':''}" id="p_${t.id}"></div>`;});
document.getElementById("tabsBar").innerHTML=h;document.getElementById("panels").innerHTML=ph;
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>swTab(t.dataset.t));
renderTab();
}
function swTab(id){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.t===id));document.querySelectorAll(".pnl").forEach(p=>p.classList.toggle("on",p.id==="p_"+id));renderTab();}
function renderTab(){const on=document.querySelector(".tab.on");if(!on)return;const id=on.dataset.t;const fn={select:rSelect,country:rCountry,diplo:rDiplo,mine:rMine,mil:rMil,war:rWar,mkt:rMkt,res:rRes,rank:rRank,blog:rBlog};if(fn[id])fn[id]();}

window.pickC=async function(cc){if(!P)return;if(!isFree(cc))return toast("کشور گرفته شده","er");const c=CDB[cc];P.cc=cc;P.at=ts();P.g=c.g;P.o=c.o;P.m=c.m;isSpec=false;document.getElementById("specBar").style.display="none";logs.push({t:ts(),x:" "+esc(P.name)+" کشور "+c.n+" را انتخاب کرد."});await saveAll();buildTabs();upAll();toast(c.f+" "+c.n+" به امپراتوری شما اضافه شد!","pe");};

function rMine(){
if(!P||!P.cc){document.getElementById("p_mine").innerHTML=`<div class="em">کشوری ندارید</div>`;return;}
const mn=calcMine(P),upC=P.ml*12000;

function calcMine(p){if(!p)return{g:0,o:0,m:0,cap:0};const b=p.cc?1+(CDB[p.cc]?.ev||0)*0.2:1;const s=Math.min((ts()-(p.lc||ts()))/1000,3600);const c=p.ml*500*b,r=p.ml*0.4*b,e=p.res.eco*0.1;return{g:Math.min(c,Math.floor((r*2+e)*s)),o:Math.min(c,Math.floor((r+e*0.5)*s)),m:Math.min(c,Math.floor((r*1.5+e*0.7)*s)),cap:c};}
window.colMine=async function(){const mn=calcMine(P);P.g+=mn.g;P.o+=mn.o;P.m+=mn.m;P.lc=ts();await saveAll();upRes();rMine();toast("استخراج شد","pe");};
window.upgM=async function(){const c=P.ml*12000;if(P.g<c)return toast("طلا کم","er");P.g-=c;P.ml++;await saveAll();upRes();rMine();toast("ارتقا یافت","pe");};

let h=`<div class="cd" style="text-align:right"><div class="nm" style="text-align:center;margin-bottom:6px"><i class="fas fa-store"></i> فروش</div><select class="sel" id="mg"><option value="g">💰 طلا</option><option value="o">🛢️ نفت</option><option value="m">⛏️ فلز</option></select><input class="nmb" type="number" id="mga" placeholder="مقدار" min="1"><select class="sel" id="mr"><option value="g">💰 طلا</option><option value="o">🛢️ نفت</option><option value="m">⛏️ فلز</option></select><input class="nmb" type="number" id="mra" placeholder="مقدار" min="1"><button class="bt bt-g bt-f" onclick="mkOf()"><i class="fas fa-plus"></i> ثبت</button></div><div class="st">بازار</div>`;
if(mkt.length===0)h+=`<div class="em">خالی</div>`;
mkt.forEach(o=>{h+=`<div class="pr"><span style="font-size:.5rem">${esc(o.sn)}: ${o.ga} ${rn[o.gv]} ➡️ ${o.rv} ${rn[o.rq]}</span>${o.si===P.id?'<span class="bg">شما</span>':`<button class="bt bt-gr bt-s" onclick="buyOf('${o.id}')">خرید</button>`}</div>`;});
document.getElementById("p_mkt").innerHTML=h;
}
window.mkOf=async function(){const gv=document.getElementById("mg").value,ga=parseInt(document.getElementById("mga").value),rq=document.getElementById("mr").value,ra=parseInt(document.getElementById("mra").value);if(!ga||!ra||ga<=0||ra<=0)return toast("مقدار نامعتبر","er");const k={g:"g",o:"o",m:"m"}[gv];if(P[k]<ga)return toast("منابع کم","er");P[k]-=ga;mkt.push({id:ts().toString(36),sn:P.name,si:P.id,gv,ga,rq,rv:ra});await saveAll();upRes();rMkt();toast("ثبت شد","pe");};
window.buyOf=async function(oid){const o=mkt.find(x=>x.id===oid);if(!o||o.si===P.id)return;const rk={g:"g",o:"o",m:"m"}[o.rq];if(P[rk]<o.rv)return toast("منابع کم","er");P[rk]-=o.rv;const sk={g:"g",o:"o",m:"m"}[o.gv];P[sk]+=o.ga;const s=allP.find(p=>p.id===o.si);if(s)s[rk]+=o.rv;mkt=mkt.filter(x=>x.id!==oid);await saveAll();upRes();rMkt();toast("معامله موفق","pe");};

function rRes(){
if(!P)return;const br=[{k:"mil",n:"نظامی",i:"fa-shield-halved"},{k:"eco",n:"اقتصاد",i:"fa-coins"},{k:"air",n:"هوانوردی",i:"fa-plane"}];
let h=`<div style="text-align:center;margin-bottom:8px;font-size:.55rem;color:var(--gl)">XP: <b>${P.xp}</b></div><div class="g3">`;
br.forEach(b=>{const lv=P.res[b.k],c=(lv+1)*18;h+=`<div class="cd"><div class="ic"><i class="fas ${b.i}"></i></div><div class="nm" style="font-size:.65rem">${b.n}</div><div class="cs">سطح: ${lv}</div><div class="cs">هزینه: ${c} XP</div><button class="bt bt-p bt-s" ${P.xp<c?"disabled":""} onclick="upgR('${b.k}')">ارتقا</button></div>`;});
document.getElementById("p_res").innerHTML=h+`</div>`;
}
window.upgR=async function(k){const c=(P.res[k]+1)*18;if(P.xp<c)return toast("XP کم","er");P.xp-=c;P.res[k]++;await saveAll();upRes();rRes();toast("ارتقا یافت","pe");};

function rRank(){
let h=`<div class="st"><i class="fas fa-trophy"></i> امپراتوری‌ها</div>`;
const s=[...allP].filter(p=>p.cc).sort((a,b)=>(b.xp||0)-(a.xp||0));
if(s.length===0)h+=`<div class="em">ثبت نشده</div>`;
s.forEach((p,i)=>{const c=CDB[p.cc],cr=i===0?"👑":i===1?"🥈":i===2?"🥉":"",st=i<3?"color:var(--gl);font-weight:900;text-shadow:0 0 8px rgba(212,160,23,.4)":"";h+=`<div class="pr"><span style="${st}">${cr}#${i+1} ${c?.f||""} ${esc(p.name)}</span><span style="font-size:.45rem">⭐${p.xp}|${c?.n||"?"}</span></div>`;});
h+=`<div class="st">آزاد: ${CKEYS.filter(k=>isFree(k)).length}/${CKEYS.length}</div>`;
document.getElementById("p_rank").innerHTML=h;
}

function rBlog(){
let h=`<div class="st"><i class="fas fa-scroll"></i> رویدادها</div><div class="bl">`;
if(logs.length===0)h+=`<div class="em">رویدادی نیست</div>`;
logs.slice().reverse().forEach(l=>{h+=`<div class="le">${l.x}<br><small style="color:var(--tx2)">${new Date(l.t).toLocaleString("fa-IR")}</small></div>`;});
document.getElementById("p_blog").innerHTML=h+`</div>`;
}

function upAll(){upRes();renderTab();}
async function syncLoop(){
if(!connected)return;
await loadAll();freeExpired();checkUN();
if(P){const me=allP.find(p=>p.id===P.id);if(me){if(P.cc&&rentLeft(me)<=0){me.cc=null;me.at=ts();isSpec=true;document.getElementById("specBar").style.display="block";buildTabs();}P=me;upRes();}}
}
async function init(){
if(await initTG()){await loadAll();document.getElementById("loginBox").style.display="flex";setInterval(syncLoop,SYNC);setInterval(()=>{if(P&&P.cc)rCountry();},30000);}
}
init();
</script>
</body>
</html>

// ========== توابع کمکی ==========
function toast(m, e = false, type = "") {
    const t = document.createElement("div");
    t.className = "toast" + (e ? " error" : "") + (type === "war" ? " war" : "") + (type === "peace" ? " peace" : "") + (type === "missile" ? " missile" : "") + (type === "naval" ? " naval" : "") + (type === "warning" ? " warning" : "");
    t.innerHTML = m;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}
function ts() { return Date.now(); }
function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
async function api(m, p = {}) {
    try {
        const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${m}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(p)
        });
        return await r.json();
    } catch (e) {
        return { ok: false, error: e.message };
    }
}

// ========== سیستم ذخیره‌سازی ==========
async function initTelegram() {
    try {
        const b = await api("getMe");
        if (!b.ok) {
            document.getElementById("syncStatus").innerHTML = "⚠️ تلگرام غیرفعال (ذخیره محلی)";
            return false;
        }
        const c = await api("getChat", { chat_id: CHANNEL_ID });
        if (!c.ok) {
            document.getElementById("syncStatus").innerHTML = "⚠️ کانال پیدا نشد (ذخیره محلی)";
            return false;
        }
        if (c.result.pinned_message?.text?.includes(DATA_KEY)) {
            msgId = c.result.pinned_message.message_id;
        }
        document.getElementById("syncStatus").innerHTML = "✅ تلگرام متصل";
        return true;
    } catch (e) {
        document.getElementById("syncStatus").innerHTML = "⚠️ خطا در تلگرام (ذخیره محلی)";
        return false;
    }
}

async function saveAll() {
    try {
        const d = {
            key: DATA_KEY,
            players: allPlayers.map(p => ({ ...p, lastActive: p.lastActive || ts() })),
            weaponSales: globalWeaponSales,
            marketOffers: marketOffers,
            diplomacy: diplomacyMessages,
            unPeace: unPeaceMessages,
            militaryMarket: militaryMarket,
            ts: ts()
        };
        localStorage.setItem(DATA_KEY, JSON.stringify(d));
        document.getElementById("syncStatus").innerHTML = `💾 ذخیره محلی | ${allPlayers.length} کشور`;
    } catch (e) {
        document.getElementById("syncStatus").innerHTML = "❌ خطا در ذخیره";
    }

    if (isConnected && msgId) {
        try {
            const d = {
                key: DATA_KEY,
                players: allPlayers.map(p => ({ ...p, lastActive: p.lastActive || ts() })),
                weaponSales: globalWeaponSales,
                marketOffers: marketOffers,
                diplomacy: diplomacyMessages,
                unPeace: unPeaceMessages,
                militaryMarket: militaryMarket,
                ts: ts()
            };
            await api("editMessageText", {
                chat_id: CHANNEL_ID,
                message_id: msgId,
                text: `🌍 ${DATA_KEY}\n${JSON.stringify(d)}`
            });
            document.getElementById("syncStatus").innerHTML = `✅ ذخیره در تلگرام | ${allPlayers.length} کشور`;
        } catch (e) {}
    }
}

async function queueSave() {
    saveQueue.push(ts());
    if (saving) return;
    saving = true;
    while (saveQueue.length > 0) {
        saveQueue.shift();
        await saveAll();
        if (saveQueue.length > 0) await new Promise(r => setTimeout(r, 1500));
    }
    saving = false;
}

async function loadAll() {
    if (isConnected) {
        try {
            const c = await api("getChat", { chat_id: CHANNEL_ID });
            if (c.ok && c.result.pinned_message?.text) {
                let t = c.result.pinned_message.text;
                t = t.replace(`🌍 ${DATA_KEY}\n`, "").replace(`🌍 ${DATA_KEY}\\n`, "");
                try {
                    const j = JSON.parse(t);
                    if (j.key === DATA_KEY) {
                        if (Array.isArray(j.players)) allPlayers = j.players;
                        if (Array.isArray(j.weaponSales)) globalWeaponSales = j.weaponSales;
                        if (Array.isArray(j.marketOffers)) marketOffers = j.marketOffers;
                        if (Array.isArray(j.diplomacy)) diplomacyMessages = j.diplomacy;
                        if (Array.isArray(j.unPeace)) unPeaceMessages = j.unPeace;
                        if (Array.isArray(j.militaryMarket)) militaryMarket = j.militaryMarket;
                        document.getElementById("syncStatus").innerHTML = `✅ بارگذاری از تلگرام | ${allPlayers.length} کشور`;
                        return;
                    }
                } catch (e) {}
            }
        } catch (e) {}
    }

    try {
        const data = localStorage.getItem(DATA_KEY);
        if (data) {
            const j = JSON.parse(data);
            if (j.key === DATA_KEY) {
                if (Array.isArray(j.players)) allPlayers = j.players;
                if (Array.isArray(j.weaponSales)) globalWeaponSales = j.weaponSales;
                if (Array.isArray(j.marketOffers)) marketOffers = j.marketOffers;
                if (Array.isArray(j.diplomacy)) diplomacyMessages = j.diplomacy;
                if (Array.isArray(j.unPeace)) unPeaceMessages = j.unPeace;
                if (Array.isArray(j.militaryMarket)) militaryMarket = j.militaryMarket;
                document.getElementById("syncStatus").innerHTML = `💾 بارگذاری محلی | ${allPlayers.length} کشور`;
                return;
            }
        }
    } catch (e) {}

    allPlayers = [];
    globalWeaponSales = [];
    marketOffers = [];
    diplomacyMessages = [];
    unPeaceMessages = [];
    militaryMarket = [];
    document.getElementById("syncStatus").innerHTML = "🔄 داده‌ای موجود نیست";
}

// ========== محاسبات ==========
function calcProduction(p) {
    const h = Math.min((ts() - (p.lastCollect || ts())) / 3600000, 24);
    const bo = (p.buildings.oilWell || 1) * 25,
        bm = (p.buildings.mine || 1) * 20,
        eco = 1 + ((p.research?.economy || 0) * 0.1);
    return {
        oil: Math.floor(bo * h * eco),
        metal: Math.floor(bm * h * eco),
        gold: Math.floor(((p.buildings.mine || 1) * 15) * h * eco)
    };
}

function calcMine(p) {
    const h = Math.min((ts() - (p.lastMineCollect || ts())) / 3600000, 24);
    const level = p.mineLevel || 1;
    const goldPerHour = level * 50;
    const metalPerHour = level * 30;
    const collected = Math.min(h, 1);
    return {
        gold: Math.floor(goldPerHour * collected),
        metal: Math.floor(metalPerHour * collected),
        canCollect: h >= 1
    };
}

function storageCap(p) { return (p.buildings.warehouse || 1) * 5000; }
function getDefense(p) {
    let d = 0;
    if (p.base?.defenses) {
        p.base.defenses.forEach(def => { if (def.hp > 0) d += def.defense || 0; });
    }
    return d;
}
function getMissileDef(p) {
    let d = 0;
    if (p.base?.defenses) {
        p.base.defenses.forEach(def => { if (def.hp > 0 && def.md) d += def.md || 0; });
    }
    return Math.min(d, 70);
}
function getTotalFuel(p) { return p.fuel || 0; }

function militaryPower(p) {
    let power = (p.units?.infantry || 0) * 10 + (p.units?.cavalry || 0) * 25 + (p.units?.artillery || 0) * 50 + ((p.research?.military || 0) * 15);
    if (p.specialWeapons) {
        for (const [n, q] of Object.entries(p.specialWeapons)) {
            if (F_DB[n] && q > 0) power += F_DB[n].p * q;
        }
    }
    if (p.fighters) {
        for (const [n, d] of Object.entries(p.fighters)) {
            if (F_DB[n] && d.count > 0) {
                const hf = (d.health || 100) / 100;
                power += F_DB[n].p * d.count * hf;
            }
        }
    }
    if (p.normalFighters) {
        for (const [n, d] of Object.entries(p.normalFighters)) {
            if (N_DB[n] && d.count > 0) {
                const hf = (d.health || 100) / 100;
                power += N_DB[n].p * d.count * hf;
            }
        }
    }
    power += (p.base?.defense || 0) * 5;
    power += getDefense(p) * 1.2;
    if (p.missiles) {
        for (const [n, q] of Object.entries(p.missiles)) {
            if (M_DB[n] && q > 0) power += M_DB[n].p * q * 0.5;
        }
    }
    if (p.carriers) {
        p.carriers.forEach(c => {
            const cd = C_DB[c.type];
            if (cd) power += cd.p * 0.6 + (c.fighters?.length || 0) * 15;
        });
    }
    return Math.floor(power);
}

function getTotalFighters(p) {
    let t = 0;
    if (p.fighters) {
        for (const [n, d] of Object.entries(p.fighters)) {
            t += d.count || 0;
        }
    }
    if (p.normalFighters) {
        for (const [n, d] of Object.entries(p.normalFighters)) {
            t += d.count || 0;
        }
    }
    return t;
}

function getFighterGlobal(n) {
    let c = 0;
    allPlayers.forEach(p => {
        if (p.fighters && p.fighters[n]) c += p.fighters[n].count || 0;
    });
    return c;
}

function getNormalFighterGlobal(n) {
    let c = 0;
    allPlayers.forEach(p => {
        if (p.normalFighters && p.normalFighters[n]) c += p.normalFighters[n].count || 0;
    });
    return c;
}

function getCarrierGlobal(n) {
    let c = 0;
    allPlayers.forEach(p => {
        if (p.carriers) {
            p.carriers.forEach(ca => { if (ca.type === n) c++; });
        }
    });
    return c;
}

function getMissileGlobal(n) {
    let c = 0;
    allPlayers.forEach(p => {
        if (p.missiles && p.missiles[n]) c += p.missiles[n] || 0;
    });
    return c;
}

function isProtected(p) { return (ts() - p.createdAt) < PROTECTION_HOURS * 3600000; }
function canAttack(p, tId) {
    const last = p.attackedRecently?.[tId] || 0;
    return (ts() - last) > ATTACK_COOLDOWN * 1000;
}

function canBuildFighter(p, n) {
    const f = F_DB[n];
    if (!f) return false;
    if (getFighterGlobal(n) >= f.g) return false;
    if ((p.research?.aviation || 0) < f.r) return false;
    if ((p.gold || 0) < f.c.g || (p.oil || 0) < f.c.o || (p.metal || 0) < f.c.m) return false;
    return true;
}

function canBuildNormal(p, n) {
    const f = N_DB[n];
    if (!f) return false;
    if ((p.gold || 0) < f.c.g || (p.oil || 0) < f.c.o || (p.metal || 0) < f.c.m) return false;
    return true;
}

function canBuildMissile(p, n) {
    const m = M_DB[n];
    if (!m) return false;
    if (getMissileGlobal(n) >= m.g) return false;
    if ((p.research?.missile || 0) < m.r) return false;
    if ((p.gold || 0) < m.c.g || (p.oil || 0) < m.c.o || (p.metal || 0) < m.c.m) return false;
    return true;
}

function canBuildCarrier(p, n) {
    const c = C_DB[n];
    if (!c) return false;
    if (getCarrierGlobal(n) >= c.g) return false;
    if ((p.gold || 0) < c.c.g || (p.oil || 0) < c.c.o || (p.metal || 0) < c.c.m) return false;
    if (p.carriers && p.carriers.length >= MAX_NAVAL) return false;
    return true;
}

function canClaimDaily(p) {
    const d = new Date(),
        today = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
    return (p.lastDailyXP || 0) < new Date(today).getTime();
}

function getPilotLevel(xp) {

    if (xp >= 150) return { l: 3, t: "آشنا", s: "⭐⭐⭐", b: .10 };
    if (xp >= 50) return { l: 2, t: "مبتدی", s: "⭐⭐", b: .05 };
    return { l: 1, t: "تازه‌کار", s: "⭐", b: 0 };
}

// ========== سیستم تمدید و انبار ==========
function getFighterExpiry(fighterData) {
    if (!fighterData) return { expired: false, daysLeft: 14, status: "safe", message: "✅ سالم" };
    const created = fighterData.createdAt || ts();
    const now = ts();
    const daysPassed = (now - created) / (24 * 3600000);
    const daysLeft = Math.max(0, 14 - daysPassed);
    if (daysLeft <= 1) return { expired: false, daysLeft, status: "urgent", message: "🔴 ۱ روز مانده" };
    if (daysLeft <= 3) return { expired: false, daysLeft, status: "warning", message: "🟡 ۳ روز مانده" };
    return { expired: false, daysLeft, status: "safe", message: "✅ " + Math.floor(daysLeft) + " روز مانده" };
}

function checkFighterExtensions() {
    if (!player) return;
    const now = ts();
    if ((now - (player.lastExtensionCheck || 0)) < 3600000) return;
    player.lastExtensionCheck = now;
    if (!player.fighters) return;
    for (const [name, data] of Object.entries(player.fighters)) {
        if (data.count <= 0) continue;
        const expiry = getFighterExpiry(data);
        if (expiry.status === "urgent") {
            toast(`⚠️ ${name} فردا منقضی میشود! برای تمدید به انبار بروید`, false, "warning");
        }
        if (expiry.status === "warning") {
            toast(`⚠️ ${name} ۳ روز دیگر منقضی میشود`, false, "warning");
        }
    }
}

function checkMilitaryMarket() {
    if (!player) return;
    const now = ts();
    militaryMarket = militaryMarket.filter(item => (now - item.addedAt) < 3600000);
    for (const item of militaryMarket) {
        if (item.sellerId === player.id && item.status === "pending") {
            const seller = allPlayers.find(p => p.id === item.sellerId);
            if (seller && !seller.fighters[item.fighterName]) {
                item.status = "expired";
            }
        }
    }
}

window.sellFighterToMarket = async function(name) {
    if (!player || !player.fighters || !player.fighters[name]) {
        toast("جنگنده یافت نشد", true);
        return;
    }
    const data = player.fighters[name];
    if (data.count <= 0) {
        toast("این جنگنده موجود نیست", true);
        return;
    }
    const now = ts();
    if ((now - (player.lastSellTime || 0)) < 900000) {
        toast("⏳ هر ۱۵ دقیقه فقط یک جنگنده می‌توانید بفروشید!", true);

        return;

    const price = Math.floor(fData.c.g * EXTEND_SELL_PERCENT / 100);
    militaryMarket.push({
        fighterName: name,
        sellerId: player.id,
        sellerName: player.name,
        price: price,
        addedAt: ts(),
        status: "pending"
    });
    data.count--;
    if (data.count <= 0) delete player.fighters[name];
    player.lastSellTime = ts();
    toast(`📢 ${name} با قیمت ${price.toLocaleString()} طلا در بازار قرار گرفت (۱ ساعت)`, false, "naval");

window.buyFromMarket = async function(index) {
    if (!player) return;
    const item = militaryMarket[index];
    if (!item) {
        toast("آگهی حذف شده", true);
        return;
    }
    if (item.sellerId === player.id) {
        toast("آگهی خودتان است", true);
        return;
    }
    if ((player.gold || 0) < item.price) {
        toast(`💰 ${item.price.toLocaleString()} طلا کافی نیست`, true);
        return;
    }
    const seller = allPlayers.find(p => p.id === item.sellerId);
    if (!seller) {
        toast("فروشنده یافت نشد", true);
        return;
    }
    const fData = F_DB[item.fighterName];
    if (!fData) {
        toast("جنگنده نامعتبر", true);
        return;
    }
    player.gold -= item.price;
    seller.gold = (seller.gold || 0) + item.price;
    if (!player.fighters) player.fighters = {};
    if (!player.fighters[item.fighterName]) {
        player.fighters[item.fighterName] = {
            count: 0,
            health: 100,
            fuel: FIGHTER_FUEL,
            score: 0,
            pilotXP: 0,
            pilotName: "خریداری شده",
            createdAt: ts()
        };
    }
    player.fighters[item.fighterName].count++;
    militaryMarket.splice(index, 1);
    const si = allPlayers.findIndex(p => p.id === seller.id);
    if (si !== -1) allPlayers[si] = seller;
    toast(`🛒 ${item.fighterName} خریداری شد! (${item.price.toLocaleString()} طلا)`, false, "naval");
    await saveCurrent();
    await queueSave();
    renderMarket();
    updateUI();
};

window.adminLogin = async function() {

            a.password = ADMIN_PASSWORD;
            allPlayers.push(a);
            await saveAll();

            document.getElementById("gameUI").style.display = "block";
            await saveCurrent();

                if (adm) player = { ...adm };

        renderAdmin();
        updateUI();

window.attackPlayer = async function(tid) {
    if (!player) return;
    const target = allPlayers.find(p => p.id === tid);
    if (!target) { toast("کشور یافت نشد", true); return; }
    if (isProtected(target)) { toast("🛡️ هدف در دوره محافظت است", true); return; }
    if (target.shieldUntil && ts() < target.shieldUntil) { toast("🛡️ این کشور تحت سپر ۱۵ دقیقه‌ای است!", true); return; }
    if (!canAttack(player, tid)) {
        const rem = Math.ceil((ATTACK_COOLDOWN * 1000 - (ts() - (player.attackedRecently?.[tid] || 0))) / 1000);
        toast(`⏳ ${rem} ثانیه تا حمله بعدی!`, true);
        return;
    }
    const fNames = Object.keys(player.fighters || {}).filter(n => player.fighters[n].count > 0 && player.fighters[n].health > 20 && player.fighters[n].fuel >= FUEL_PER_ATTACK);
    const nNames = Object.keys(player.normalFighters || {}).filter(n => player.normalFighters[n].count > 0 && player.normalFighters[n].health > 20);
    if (fNames.length === 0 && nNames.length === 0) { toast("❌ جنگنده قابل استفاده ندارید!", true); return; }
    let avail = [];
    for (const n of fNames) {
        const d = player.fighters[n];
        const pl = getPilotLevel(d.pilotXP || 0);
        const c = Math.min(d.count, MAX_ATTACK_FIGHTERS);
        for (let i = 0; i < c; i++) {
            avail.push({ name: n, type: "special", health: d.health || 100, fuel: d.fuel || 0, pilotXP: d.pilotXP || 0, pilotLevel: pl, power: F_DB[n].p, index: i });
        }
    }
    for (const n of nNames) {
        const d = player.normalFighters[n];
        const c = Math.min(d.count, MAX_ATTACK_FIGHTERS);
        for (let i = 0; i < c; i++) {
            avail.push({ name: n, type: "normal", health: d.health || 100, fuel: 10, power: N_DB[n].p, index: i });
        }
    }
    if (avail.length === 0) { toast("❌ جنگنده قابل استفاده ندارید!", true); return; }
    avail = avail.slice(0, MAX_ATTACK_FIGHTERS);
    let selected = [],
        selectedHTML = `<div class="section-title">🎯 انتخاب جنگنده (حداکثر ${MAX_ATTACK_FIGHTERS})</div><div class="fighter-select-grid">`;
    avail.forEach((f, i) => {
        const isSel = selected.some(s => s.name === f.name && s.index === f.index);
        const fData = f.type === "special" ? F_DB[f.name] : N_DB[f.name];
        selectedHTML += `<div class="fighter-select-card ${isSel ? "selected" : ""}" onclick="toggleFighterSelect(${i})"><div class="icon">${fData.i || "🛩️"}</div><div class="name">${f.name}</div><div class="stats">❤️${f.health}% ⛽${f.fuel}</div><div class="stats">${f.type === "special" ? getPilotLevel(f.pilotXP || 0).s : "⭐"}</div></div>`;
    });
    selectedHTML += `</div><div class="info-bar">انتخاب شده: <span id="selCount">0</span></div><button class="btn-attack" onclick="confirmAttack('${tid}')">⚔️ حمله</button><button class="btn-red" onclick="clearFighterSelect()">🗑️ پاک کردن</button>`;
    window._attackData = { avail, selected: [], targetId: tid };
    document.getElementById("militaryContent").innerHTML = selectedHTML;
    updateSelectUI();
};

window.toggleFighterSelect = function(i) {
    const d = window._attackData;
    if (!d) return;
    const f = d.avail[i];
    if (!f) return;
    const idx = d.selected.findIndex(s => s.name === f.name && s.index === f.index);
    if (idx !== -1) {
        d.selected.splice(idx, 1);
    } else {
        if (d.selected.length >= MAX_ATTACK_FIGHTERS) { toast(`❌ حداکثر ${MAX_ATTACK_FIGHTERS} جنگنده`, true); return; }
        d.selected.push({ ...f });
    }
    document.getElementById("selCount").innerText = d.selected.length;
    updateSelectUI();
};

window.clearFighterSelect = function() {
    const d = window._attackData;
    if (d) { d.selected = [];
        document.getElementById("selCount").innerText = "0";
        updateSelectUI(); }
};

function updateSelectUI() {
    const d = window._attackData;
    if (!d) return;
    const cards = document.querySelectorAll(".fighter-select-card");
    cards.forEach((card, i) => {
        if (i < d.avail.length) {
            const isSel = d.selected.some(s => s.name === d.avail[i].name && s.index === d.avail[i].index);
            card.className = "fighter-select-card" + (isSel ? " selected" : "");
        }
    });
}

window.confirmAttack = async function(tid) {
    const d = window._attackData;
    if (!d || d.selected.length === 0) { toast("❌ حداقل یک جنگنده انتخاب کنید!", true); return; }
    const target = allPlayers.find(p => p.id === tid);
    if (!target) { toast("کشور یافت نشد", true); return; }
    if (target.shieldUntil && ts() < target.shieldUntil) { toast("🛡️ هدف تحت سپر است!", true); return; }
    let totalPower = 0,
        totalF = 0,
        attackLog = [],
        xpGain = 0,
        stolenG = 0,
        stolenO = 0,
        stolenM = 0,
        defDestroyed = 0;
    for (const sel of d.selected) {
        const fData = sel.type === "special" ? F_DB[sel.name] : N_DB[sel.name];
        if (!fData) continue;
        const pData = sel.type === "special" ? player.fighters[sel.name] : player.normalFighters[sel.name];
        if (!pData || pData.count <= 0) continue;
        const pilotBonus = sel.type === "special" ? (getPilotLevel(sel.pilotXP || 0).b || 0) : 0;
        const healthFactor = sel.health / 100;
        const power = fData.p * (1 + pilotBonus) * healthFactor;
        totalPower += power;
        totalF++;
        if (sel.type === "special") {
            pData.fuel = Math.max(0, (pData.fuel || 0) - FUEL_PER_ATTACK);
            const defDmg = rnd(5, 15);
            pData.health = Math.max(0, (pData.health || 100) - defDmg);
            if (pData.health <= 0) {
                pData.count--;
                attackLog.push(`💀 ${sel.name} نابود شد!`);
                if (pData.count <= 0) delete player.fighters[sel.name];
            } else {
                pData.pilotXP = (pData.pilotXP || 0) + 2;
                xpGain += 2;
            }
        } else {
            pData.health = Math.max(0, (pData.health || 100) - rnd(10, 20));
            if (pData.health <= 0) {
                pData.count--;
                attackLog.push(`💀 ${sel.name} (معمولی) نابود شد!`);
                if (pData.count <= 0) delete player.normalFighters[sel.name];
            }
        }
    }
    const targetDef = getDefense(target);
    const defRed = Math.min(targetDef * 0.3, 50);
    const effPower = totalPower * (1 - defRed / 100);
    if (target.base?.defenses) {
        target.base.defenses.forEach(def => {
            const dmg = Math.floor(effPower / 100) + 5;
            def.hp = Math.max(0, def.hp - dmg);
            if (def.hp <= 0) defDestroyed++;
        });
        target.base.defenses = target.base.defenses.filter(def => def.hp > 0);
    }
    const tg = target.gold || 0,
        to = target.oil || 0,
        tm = target.metal || 0;
    stolenG = Math.floor(tg * STEAL / 100);
    stolenO = Math.floor(to * STEAL / 100);
    stolenM = Math.floor(tm * STEAL / 100);
    player.gold = (player.gold || 0) + stolenG;
    player.oil = (player.oil || 0) + stolenO;
    player.metal = (player.metal || 0) + stolenM;
    target.gold = Math.max(0, target.gold - stolenG);
    target.oil = Math.max(0, target.oil - stolenO);
    target.metal = Math.max(0, target.metal - stolenM);
    const xp = Math.floor(totalF * 2) + (defDestroyed > 0 ? 3 : 0);
    player.xp = (player.xp || 0) + xp;
    player.attackedRecently[tid] = ts();
    player.lastAttackTime = ts();
    target.shieldUntil = ts() + 15 * 60 * 1000;
    const idx = allPlayers.findIndex(p => p.id === tid);
    if (idx !== -1) allPlayers[idx] = target;
    let logHTML = `<div class="war-declaration"><div style="color:#fbbf24;font-weight:bold">⚔️ گزارش نبرد</div><div style="font-size:0.65rem;color:#94a3b8">🎯 هدف: ${target.name}</div><div style="font-size:0.65rem;color:#94a3b8">🛩️ تعداد: ${totalF}</div><div style="font-size:0.65rem;color:#94a3b8">⚡ قدرت: ${Math.floor(totalPower)}</div><hr><div style="font-size:0.65rem;color:#4ade80">💰 غارت: ${stolenG.toLocaleString()} طلا | ${stolenO.toLocaleString()} نفت | ${stolenM.toLocaleString()} فلز</div><div style="font-size:0.65rem;color:#fbbf24">⭐ XP: ${xp}</div><div style="font-size:0.65rem;color:#ef4444">🛡️ پدافند نابود شده: ${defDestroyed}</div>${attackLog.map(l => `<div style="font-size:0.55rem;color:#fca5a5">${l}</div>`).join("")}<hr><div style="font-size:0.55rem;color:#fbbf24">🛡️ سپر ۱۵ دقیقه‌ای فعال شد</div><button class="btn-gold" onclick="renderMilitary()" style="margin-top:4px">🔄 بازگشت</button></div>`;
    document.getElementById("militaryContent").innerHTML = logHTML;

window.buildFighter = async function(n) {
    const f = F_DB[n];
    if (!f) { toast("جنگنده نامعتبر", true); return; }
    if (!canBuildFighter(player, n)) { toast("❌ شرایط ساخت فراهم نیست (هوانوردی ${f.r} یا منابع)", true); return; }
    const opts = [{ type: "main", label: "پایگاه اصلی", fighters: player.base?.fighters?.length || 0 }];
    if (player.carriers) {
        player.carriers.forEach((c, i) => {
            if (c.fighters && c.fighters.length < CARRIER_SLOTS) {
                opts.push({ type: "carrier", index: i, label: `ناو ${c.type}`, fighters: c.fighters?.length || 0 });
            }
        });
    }
    let sel = null;
    for (const o of opts) {
        if (o.fighters < MAX_FIGHTERS_PER_BASE) { sel = o; break; }
    }
    if (!sel) { toast("❌ همه پایگاه‌ها پر هستند!", true); return; }
    player.gold = (player.gold || 0) - f.c.g;
    player.oil = (player.oil || 0) - f.c.o;
    player.metal = (player.metal || 0) - f.c.m;
    if (!player.fighters) player.fighters = {};
    if (!player.fighters[n]) {
        const pn = f.pl ? f.pl[rnd(0, f.pl.length - 1)] : "خلبان";
        player.fighters[n] = { count: 0, health: 100, fuel: FIGHTER_FUEL, score: 0, pilotXP: 0, pilotName: pn, createdAt: ts() };
    }
    player.fighters[n].count++;
    if (!player.fighters[n].createdAt) player.fighters[n].createdAt = ts();
    if (!player.fighters[n].pilotName) {
        const pn = f.pl ? f.pl[rnd(0, f.pl.length - 1)] : "خلبان";
        player.fighters[n].pilotName = pn;
    }
    const fighter = { name: n, health: 100, fuel: FIGHTER_FUEL, createdAt: ts() };
    if (sel.type === "main") {
        if (!player.base.fighters) player.base.fighters = [];
        player.base.fighters.push(fighter);
    } else if (sel.type === "carrier") {
        const cr = player.carriers[sel.index];
        if (!cr.fighters) cr.fighters = [];
        cr.fighters.push(fighter);
    }
    player.xp = (player.xp || 0) + 3;
    await saveCurrent();
    updateUI();
    toast(`✈️ ${n} ساخته شد! +۳ XP`, false, "war");
};

window.repairFighter = async function(n, idx) {
    if (!player || !player.fighters || !player.fighters[n]) { toast("جنگنده یافت نشد", true); return; }
    const d = player.fighters[n];
    if (d.health >= 100) { toast("جنگنده سالم است", true); return; }
    const cost = FIGHTER_REPAIR * (1 + (100 - d.health) / 100);
    if ((player.gold || 0) < cost) { toast(`💰 ${Math.floor(cost).toLocaleString()} طلا لازم است`, true); return; }
    player.gold -= Math.floor(cost);
    d.health = Math.min(100, d.health + 30);
    const allF = [];
    if (player.base?.fighters) allF.push(...player.base.fighters);
    if (player.carriers) {
        player.carriers.forEach(c => { if (c.fighters) allF.push(...c.fighters); });
    }
    let c = 0;
    for (const f of allF) {
        if (f.name === n) {
            if (c === idx) { f.health = Math.min(100, f.health + 30); break; }
            c++;
        }
    }
    toast(`🔧 ${n} تعمیر شد!`, false, "peace");
    await saveCurrent();
    updateUI();
};

window.refuelFighter = async function(n, idx) {

    player.fuel -= amt;
    d.fuel += amt;
    const allF = [];
    if (player.base?.fighters) allF.push(...player.base.fighters);
    if (player.carriers) {
        player.carriers.forEach(c => { if (c.fighters) allF.push(...c.fighters); });
    }
    let c = 0;
    for (const f of allF) {
        if (f.name === n) {
            if (c === idx) { f.fuel = Math.min(FIGHTER_FUEL, f.fuel + amt); break; }
            c++;
        }
    }
    toast(`⛽ ${n} سوخت‌گیری شد (+${amt})`, false, "naval");
    await saveCurrent();
    updateUI();
};

window.launchMissile = async function(tid) {
    if (!player) return;
    const target = allPlayers.find(p => p.id === tid);
    if (!target) { toast("کشور یافت نشد", true); return; }
    if (isProtected(target)) { toast("🛡️ هدف در دوره محافظت است", true); return; }
    if (target.shieldUntil && ts() < target.shieldUntil) { toast("🛡️ این کشور تحت سپر است!", true); return; }
    const total = getTotalMissiles();
    if (total === 0) { toast("❌ هیچ موشکی ندارید!", true); return; }
    if ((player.gold || 0) < 500) { toast(`💰 ۵۰۰ طلا برای پرتاب لازم است`, true); return; }
    const names = Object.keys(player.missiles).filter(n => player.missiles[n] > 0);
    if (names.length === 0) { toast("موشکی موجود نیست", true); return; }
    const mn = names[rnd(0, names.length - 1)],
        md = M_DB[mn];
    player.gold -= 500;
    player.missiles[mn]--;
    if (player.missiles[mn] <= 0) delete player.missiles[mn];
    const mdDef = getMissileDef(target);
    const ic = Math.min(mdDef, 60),
        isInt = Math.random() * 100 < ic;
    if (isInt) { toast(`🛡️ موشک ${mn} توسط پدافند رهگیری شد!`, false, "missile");
        await saveCurrent();
        updateUI(); return; }
    const sg = Math.floor((target.gold || 0) * STEAL / 100),
        so = Math.floor((target.oil || 0) * STEAL / 100),
        sm = Math.floor((target.metal || 0) * STEAL / 100);
    player.gold = (player.gold || 0) + sg;
    player.oil = (player.oil || 0) + so;
    player.metal = (player.metal || 0) + sm;
    target.gold = Math.max(0, target.gold - sg);
    target.oil = Math.max(0, target.oil - so);
    target.metal = Math.max(0, target.metal - sm);
    let defD = 0;
    if (target.base?.defenses) {
        target.base.defenses.forEach(d => { d.hp = Math.max(0, d.hp - 30); if (d.hp <= 0) defD++; });
        target.base.defenses = target.base.defenses.filter(d => d.hp > 0);
    }
    player.xp = (player.xp || 0) + 5;
    target.shieldUntil = ts() + 15 * 60 * 1000;
    const idx = allPlayers.findIndex(p => p.id === tid);
    if (idx !== -1) allPlayers[idx] = target;
    toast(`🚀 موشک ${mn} اصابت کرد! 💰 ${sg.toLocaleString()} طلا غارت شد`, false, "missile");
    await saveCurrent();
    await queueSave();
    updateUI();
};

function getTotalMissiles() {
    let t = 0;
    if (player.missiles) {
        for (const [n, d] of Object.entries(player.missiles)) { t += d || 0; }
    }
    return t;
}

// ========== اکشن‌های عمومی ==========
window.collectAll = async function() {
    if (!player) return;
    const p = calcProduction(player);
    player.gold = (player.gold || 0) + (p.gold || 0);
    player.oil = (player.oil || 0) + (p.oil || 0);
    player.metal = (player.metal || 0) + (p.metal || 0);
    player.lastCollect = ts();
    const cap = storageCap(player);
    player.oil = Math.min(player.oil, cap);
    player.metal = Math.min(player.metal, cap);
    await saveCurrent();
    updateUI();
    toast("📥 منابع جمع‌آوری شد");
};

window.trainUnit = async function(u) {
    if (!player) return;
    const costs = { infantry: 50, cavalry: 120, artillery: 300 };
    if ((player.gold || 0) >= costs[u]) {
        player.gold -= costs[u];
        player.units[u] = (player.units[u] || 0) + 1;
        await saveCurrent();
        updateUI();
        toast(`🪖 ${u} استخدام شد!`);
    } else toast("💰 طلا کافی نیست!", true);
};

window.upgradeBuilding = async function(b) {
    if (!player) return;
    const costs = { oilWell: 250, farm: 200, mine: 300, barracks: 350, wall: 150, warehouse: 220 };
    const base = costs[b] || 300,
        lv = player.buildings[b] || 1,
        cost = lv * base;
    if ((player.gold || 0) >= cost) {
        player.gold -= cost;
        player.buildings[b] = (player.buildings[b] || 0) + 1;
        await saveCurrent();
        updateUI();
        toast(`✅ ${b} به سطح ${player.buildings[b]} ارتقا یافت!`);
    } else toast("💰 طلا کافی نیست!", true);
};

window.claimDailyXP = async function() {
    if (!canClaimDaily(player)) { toast("✅ امروز XP دریافت کردید", true); return; }
    player.xp = (player.xp || 0) + DAILY_XP;
    player.lastDailyXP = ts();
    const nl = Math.floor((player.xp || 0) / XP_PER_LEVEL) + 1;
    if (nl > (player.militaryLevel || 1)) {
        player.militaryLevel = nl;
        toast(`🎖️ سطح نظامی به ${nl} ارتقا یافت!`);
    }
    await saveCurrent();
    updateUI();
    toast("⭐ ۱ XP دریافت شد!");
};

window.upgradeBase = async function() {
    if (!player.base) player.base = { level: 1, storage: 0, maxStorage: 10000, defense: 10, fighters: [], defenses: [] };
    const cost = player.base.level * 1500;
    if ((player.gold || 0) < cost) { toast("💰 طلا کافی نیست", true); return; }
    player.gold -= cost;
    player.base.level++;
    player.base.maxStorage += 5000;
    player.base.defense += 5;
    await saveCurrent();
    updateUI();
    toast(`🏰 پایگاه به سطح ${player.base.level} ارتقا یافت`);
};

window.depositToBase = async function() {
    if (!player.base) player.base = { level: 1, storage: 0, maxStorage: 10000, defense: 10, fighters: [], defenses: [] };
    const d = Math.floor((player.gold || 0) * 0.3);
    if (d < 10) { toast("مقدار کم است", true); return; }
    if (player.base.storage + d > player.base.maxStorage) { toast("انبار پایگاه پر است", true); return; }
    player.gold -= d;
    player.base.storage += d;
    await saveCurrent();
    updateUI();
    toast(`📥 ${d.toLocaleString()} طلا به پایگاه واریز شد`);
};

window.withdrawFromBase = async function() {
    if (!player.base || player.base.storage < 50) { toast("موجودی پایگاه کافی نیست", true); return; }
    const w = Math.min(500, player.base.storage);
    player.base.storage -= w;
    player.gold = (player.gold || 0) + w;
    await saveCurrent();
    updateUI();
    toast(`📤 ${w.toLocaleString()} طلا از پایگاه برداشت شد`);
};

window.research = async function(f) {
    if (!player) return;
    const costs = { military: 800, economy: 700, aviation: 1500, missile: 2000 };
    const cost = ((player.research[f] || 0) + 1) * costs[f];
    if ((player.gold || 0) >= cost) {
        player.gold -= cost;
        player.research[f] = (player.research[f] || 0) + 1;
        await saveCurrent();
        updateUI();
        toast(`🔬 ${f} سطح ${player.research[f]}`);
    } else toast("💰 طلا کافی نیست", true);
};

async function saveCurrent() {
    if (!player) return;
    player.lastActive = ts();
    const idx = allPlayers.findIndex(p => p.id === player.id);
    if (idx !== -1) allPlayers[idx] = { ...player };
    else allPlayers.push({ ...player });
    await queueSave();
    updateUI();
}

// ========== بک‌گراند خفن ==========
const canvas = document.getElementById("bgCanvas"),
    ctx = canvas.getContext("2d");
let stars = [],
    shootingStars = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ستاره‌ها
for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.5,
        a: Math.random() * 0.8 + 0.2,
        speed: Math.random() * 0.02 + 0.005
    });
}

// شهاب‌واره‌ها
function createShootingStar() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.3,
        len: Math.random() * 80 + 40,
        speed: Math.random() * 6 + 4,
        angle: Math.PI / 4 + (Math.random() - 0.5) * 0.5,
        life: 1,
        decay: Math.random() * 0.01 + 0.005
    };
}

function drawBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // گرادیانت پس‌زمینه
    const grad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width * 0.7);
    grad.addColorStop(0, "#1a1a3e");
    grad.addColorStop(0.5, "#0f0f23");
    grad.addColorStop(1, "#050510");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ستاره‌ها
    stars.forEach(s => {
        s.a += s.speed;
        if (s.a > 1) s.a = 0.2;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a * 0.6})`;
        ctx.fill();
    });

    // شهاب‌واره‌ها
    if (Math.random() < 0.02 && shootingStars.length < 3) {
        shootingStars.push(createShootingStar());
    }

    shootingStars.forEach((ss, idx) => {
        ss.x += ss.speed * Math.cos(ss.angle);
        ss.y += ss.speed * Math.sin(ss.angle);
        ss.life -= ss.decay;

        ctx.beginPath();
        ctx.moveTo(ss.x, ss.y);
        ctx.lineTo(ss.x - ss.len * Math.cos(ss.angle), ss.y - ss.len * Math.sin(ss.angle));
        ctx.strokeStyle = `rgba(255,220,180,${ss.life * 0.8})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        // دم شهاب
        ctx.beginPath();
        ctx.arc(ss.x, ss.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${ss.life * 0.5})`;
        ctx.fill();

        if (ss.life <= 0 || ss.x > canvas.width || ss.y > canvas.height) {
            shootingStars.splice(idx, 1);
        }
    });

    // افکت نئون دور تا دور
    const grd = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.width * 0.3, canvas.width / 2, canvas.height / 2, canvas.width * 0.9);
    grd.addColorStop(0, "rgba(245,158,11,0.02)");
    grd.addColorStop(0.5, "rgba(245,158,11,0.04)");
    grd.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    requestAnimationFrame(drawBg);
}
drawBg();

// ========== شروع ==========
async function startGame() {
    const n = document.getElementById("playerName").value.trim();
    const p = document.getElementById("playerPassword").value.trim();

    if (!n || n.length < 3) { toast("نام حداقل ۳ کاراکتر", true); return; }
    if (!p || p.length < 4) { toast("رمز حداقل ۴ کاراکتر", true); return; }

    document.getElementById("startBtn").disabled = true;
    await loadAll();

    const userIP = await getUserIP();
    localStorage.setItem('userIP', userIP);

    const existingByIP = allPlayers.find(pl => pl.ip === userIP);
    let found = allPlayers.find(pl => pl.name === n && pl.password === p);

    if (found) {
        player = { ...found };
        if (player.ip !== userIP) {
            player.ip = userIP;
            const idx = allPlayers.findIndex(pl => pl.id === player.id);
            if (idx !== -1) allPlayers[idx].ip = userIP;
        }
        if (canClaimDaily(player)) {
            player.xp = (player.xp || 0) + 1;
            player.lastDailyXP = ts();
            toast("⭐ +۱ XP روزانه");
        }
        toast(`👋 خوش آمدید ${n}`);
    } else if (allPlayers.some(pl => pl.name === n)) {
        toast("❌ این نام قبلاً ثبت شده است!", true);
        document.getElementById("startBtn").disabled = false;
        return;
    } else if (existingByIP) {
        toast(`⚠️ شما قبلاً با نام "${existingByIP.name}" ثبت نام کرده‌اید!`, false, "warning");
        document.getElementById("playerName").value = existingByIP.name;
        document.getElementById("startBtn").disabled = false;
        return;
    } else {
        player = createPlayer(n, p);
        player.ip = userIP;
        toast(`🏴 کشور ${n} تأسیس شد! +۱ XP`);
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("gameUI").style.display = "block";
    await saveCurrent();
    updateUI();

    setInterval(async () => {
        if (player) {
            await loadAll();
            checkFighterExtensions();
            checkMilitaryMarket();
            updateUI();
        }
    }, 45000);
}

document.getElementById("startBtn").onclick = startGame;
